<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备管理 - 智能相册云平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="dashboard.html" class="navbar-brand">智能相册云平台</a>
            <div class="navbar-nav">
                <a href="dashboard.html" class="nav-link">控制台</a>
                <a href="albums.html" class="nav-link">相册</a>
                <a href="devices.html" class="nav-link active">设备</a>
                <a href="#" class="nav-link" onclick="logout()">退出</a>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 30px;">
        <div class="page-header">
            <h2>设备管理</h2>
            <button class="btn btn-primary" onclick="showBindModal()">
                <span>+</span> 绑定设备
            </button>
        </div>
        
        <div id="devicesContainer" class="devices-list">
            <!-- 设备列表将在这里渲染 -->
        </div>
    </main>

    <!-- 绑定设备模态框 -->
    <div class="modal" id="bindModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>绑定设备</h3>
                <button class="modal-close" onclick="hideBindModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">设备ID</label>
                    <input type="text" class="form-input" id="deviceUid" placeholder="请输入64位芯片ID（16位十六进制字符）">
                    <small style="color: var(--text-muted);">设备ID为64位芯片ID，16位十六进制字符</small>
                </div>
                <div class="form-group">
                    <label class="form-label">设备名称（可选）</label>
                    <input type="text" class="form-input" id="deviceName" placeholder="例如：客厅相册">
                </div>
                <div class="form-group">
                    <label class="form-label">设备描述（可选）</label>
                    <input type="text" class="form-input" id="deviceDesc" placeholder="例如：放在客厅的智能相册">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="hideBindModal()">取消</button>
                <button class="btn btn-primary" onclick="bindDevice()">绑定</button>
            </div>
        </div>
    </div>

    <!-- 下发图片模态框 -->
    <div class="modal" id="sendModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3>选择图片下发到设备</h3>
                <button class="modal-close" onclick="hideSendModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">选择相册</label>
                    <select class="form-input" id="albumSelect" onchange="loadAlbumImages()">
                        <option value="">请选择相册</option>
                    </select>
                </div>
                <div id="imageSelector" class="image-selector">
                    <!-- 图片将在这里渲染 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="hideSendModal()">取消</button>
                <button class="btn btn-primary" onclick="sendImage()">下发到设备</button>
            </div>
        </div>
    </div>

    <script>
        let devices = [];
        let albums = [];
        let currentDeviceId = null;
        let selectedImageId = null;

        // 检查登录
        async function checkAuth() {
            try {
                const response = await fetch('backend/api/user/profile.php');
                const result = await response.json();
                if (!result.success) {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                window.location.href = 'index.html';
            }
        }

        // 加载设备列表
        async function loadDevices() {
            try {
                const response = await fetch('backend/api/devices/list.php');
                const result = await response.json();
                
                if (result.success) {
                    devices = result.data.devices;
                    renderDevices();
                }
            } catch (error) {
                console.error('加载设备失败:', error);
            }
        }

        // 渲染设备列表
        function renderDevices() {
            const container = document.getElementById('devicesContainer');
            
            if (devices.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📱</div>
                        <h3>暂无绑定设备</h3>
                        <p>点击上方按钮绑定您的智能相册设备</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = devices.map(device => `
                <div class="device-item">
                    <div class="device-info">
                        <h4>${device.name || '未命名设备'}</h4>
                        <p>${device.description || '无描述'}</p>
                        <div class="device-meta">
                            <span>ID: ${device.device_uid}</span>
                            <span>绑定时间: ${new Date(device.bound_at).toLocaleDateString()}</span>
                            <span class="device-status ${getStatusClass(device.status)}">
                                ${getStatusText(device.status)}
                            </span>
                        </div>
                        ${device.current_image_name ? `
                            <div style="margin-top: 8px; font-size: 0.75rem; color: var(--primary-color);">
                                当前显示: ${device.current_image_name}
                            </div>
                        ` : ''}
                    </div>
                    <div class="device-actions">
                        <button class="btn btn-primary" onclick="showSendModal(${device.id})">下发图片</button>
                        <button class="btn btn-danger" onclick="unbindDevice(${device.id})">解绑</button>
                    </div>
                </div>
            `).join('');
        }

        // 获取状态样式
        function getStatusClass(status) {
            switch (parseInt(status)) {
                case 1: return 'status-online';
                case 2: return 'status-offline';
                default: return 'status-unbound';
            }
        }

        // 获取状态文本
        function getStatusText(status) {
            switch (parseInt(status)) {
                case 1: return '● 在线';
                case 2: return '● 离线';
                default: return '● 未绑定';
            }
        }

        // 显示绑定模态框
        function showBindModal() {
            document.getElementById('bindModal').classList.add('show');
            document.getElementById('deviceUid').value = '';
            document.getElementById('deviceName').value = '';
            document.getElementById('deviceDesc').value = '';
        }

        // 隐藏绑定模态框
        function hideBindModal() {
            document.getElementById('bindModal').classList.remove('show');
        }

        // 绑定设备
        async function bindDevice() {
            const uid = document.getElementById('deviceUid').value.trim();
            const name = document.getElementById('deviceName').value.trim();
            const desc = document.getElementById('deviceDesc').value.trim();
            
            if (!uid) {
                alert('请输入设备ID');
                return;
            }
            
            if (!/^[a-f0-9]{16}$/i.test(uid)) {
                alert('设备ID格式不正确，应为16位十六进制字符（64位芯片ID）');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('device_uid', uid);
                formData.append('name', name);
                formData.append('description', desc);
                
                const response = await fetch('backend/api/devices/bind.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    hideBindModal();
                    loadDevices();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert('绑定失败');
            }
        }

        // 解绑设备
        async function unbindDevice(deviceId) {
            if (!confirm('确定要解绑该设备吗？')) return;
            
            try {
                const formData = new FormData();
                formData.append('device_id', deviceId);
                
                const response = await fetch('backend/api/devices/unbind.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    loadDevices();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert('解绑失败');
            }
        }

        // 显示下发图片模态框
        async function showSendModal(deviceId) {
            currentDeviceId = deviceId;
            selectedImageId = null;
            document.getElementById('sendModal').classList.add('show');
            
            // 加载相册列表
            await loadAlbumsForSelect();
        }

        // 隐藏下发图片模态框
        function hideSendModal() {
            document.getElementById('sendModal').classList.remove('show');
            currentDeviceId = null;
            selectedImageId = null;
        }

        // 加载相册列表到选择器
        async function loadAlbumsForSelect() {
            try {
                const response = await fetch('backend/api/albums/list.php');
                const result = await response.json();
                
                if (result.success) {
                    albums = result.data.albums;
                    const select = document.getElementById('albumSelect');
                    select.innerHTML = '<option value="">请选择相册</option>' + 
                        albums.map(a => `<option value="${a.id}">${a.name} (${a.image_count}张)</option>`).join('');
                }
            } catch (error) {
                console.error('加载相册失败:', error);
            }
        }

        // 加载相册图片
        async function loadAlbumImages() {
            const albumId = document.getElementById('albumSelect').value;
            if (!albumId) {
                document.getElementById('imageSelector').innerHTML = '';
                return;
            }
            
            try {
                const response = await fetch(`backend/api/albums/images.php?album_id=${albumId}`);
                const result = await response.json();
                
                if (result.success) {
                    renderImageSelector(result.data.images);
                }
            } catch (error) {
                console.error('加载图片失败:', error);
            }
        }

        // 渲染图片选择器
        function renderImageSelector(images) {
            const container = document.getElementById('imageSelector');
            
            if (images.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted);">该相册暂无图片</p>';
                return;
            }
            
            container.innerHTML = images.map(image => `
                <div class="selector-item" data-id="${image.id}" onclick="selectImage(this, ${image.id})">
                    <img src="uploads/${image.file_path}" alt="${image.original_name}">
                </div>
            `).join('');
        }

        // 选择图片
        function selectImage(element, imageId) {
            document.querySelectorAll('.selector-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedImageId = imageId;
        }

        // 下发图片
        async function sendImage() {
            if (!selectedImageId) {
                alert('请选择一张图片');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('device_id', currentDeviceId);
                formData.append('image_id', selectedImageId);
                
                const response = await fetch('backend/api/devices/send-image.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('图片下发成功！');
                    hideSendModal();
                    loadDevices();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert('下发失败');
            }
        }

        // 退出登录
        async function logout() {
            await fetch('backend/api/auth/logout.php');
            window.location.href = 'index.html';
        }

        // 页面加载
        checkAuth();
        loadDevices();
    </script>
</body>
</html>
