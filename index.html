<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智能相册云平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-box">
            <div class="auth-header">
                <h1>智能相册云平台</h1>
                <p>欢迎回来，请登录您的账号</p>
            </div>
            
            <div class="alert alert-error" id="alert"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名或邮箱</label>
                    <input type="text" class="form-input" name="account" placeholder="请输入用户名或邮箱" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" name="password" placeholder="请输入密码" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div class="captcha-group">
                        <input type="text" class="form-input" name="captcha" placeholder="请输入验证码" maxlength="4" required>
                        <img src="backend/api/auth/captcha.php" alt="验证码" class="captcha-img" id="captchaImg" title="点击刷新">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="submitBtn">
                    登录
                </button>
            </form>
            
            <div class="auth-footer">
                还没有账号？<a href="register.html">立即注册</a>
            </div>
        </div>
    </div>

    <script>
        // 刷新验证码
        function refreshCaptcha() {
            document.getElementById('captchaImg').src = 'backend/api/auth/captcha.php?' + Date.now();
        }
        
        document.getElementById('captchaImg').addEventListener('click', refreshCaptcha);
        
        // 显示提示
        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert alert-' + type + ' show';
            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }
        
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> 登录中...';
            
            const formData = new FormData(this);
            
            try {
                const response = await fetch('backend/api/auth/login.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert('登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    showAlert(result.message);
                    refreshCaptcha();
                    submitBtn.disabled = false;
                    submitBtn.textContent = '登录';
                }
            } catch (error) {
                showAlert('网络错误，请稍后重试');
                refreshCaptcha();
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
